version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Pinned to the extension's engines.vscode minimum; a newer types
      # package than the engine breaks typecheck and vsce packaging.
      - dependency-name: "@types/vscode"
    groups:
      dev-dependencies:
        patterns: ["*"]
        dependency-type: development
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
