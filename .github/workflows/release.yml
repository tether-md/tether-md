# Release procedure:
#   1. Bump versions in packages/*/package.json (kernel, cli, vscode-ext in lockstep).
#   2. Commit, then tag and push: git tag vX.Y.Z && git push origin vX.Y.Z
#   3. This workflow publishes @tether-md/kernel and tether-md to npm (trusted
#      publishing via OIDC — no npm token) and creates a GitHub release with
#      the .vsix attached.
# Optional repo secrets: VSCE_PAT (VS Code Marketplace), OVSX_PAT (Open VSX).
# The marketplace publish steps are skipped when a secret is not configured.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm test
      # Skip-if-published makes a partially failed release safe to re-tag: steps whose
      # version already reached the registry no-op instead of failing the whole job.
      - name: Publish @tether-md/kernel
        run: |
          V=$(node -p "require('./packages/kernel/package.json').version")
          if npm view "@tether-md/kernel@$V" version >/dev/null 2>&1; then
            echo "@tether-md/kernel@$V already on the registry; skipping"
          else
            npm publish --provenance -w @tether-md/kernel
          fi
      - name: Publish tether-md
        run: |
          V=$(node -p "require('./packages/cli/package.json').version")
          if npm view "tether-md@$V" version >/dev/null 2>&1; then
            echo "tether-md@$V already on the registry; skipping"
          else
            npm publish --provenance -w tether-md
          fi
      - run: npm run package
        working-directory: packages/vscode-ext
      - run: npx @vscode/vsce publish --packagePath packages/vscode-ext/tether-md.vsix --no-dependencies
        if: env.VSCE_PAT != ''
      - run: npx ovsx publish packages/vscode-ext/tether-md.vsix -p "$OVSX_PAT"
        if: env.OVSX_PAT != ''
      - uses: softprops/action-gh-release@v3
        with:
          files: packages/vscode-ext/tether-md.vsix
          generate_release_notes: true
